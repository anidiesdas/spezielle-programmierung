services:
  data-service:
    build:
      context: .
      dockerfile: data-service/Dockerfile
    ports:
      - "3001:3001"

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - data-service